name: Retrospective Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Cache data
        uses: actions/cache@v3
        with:
          path: data/
          key: ${{ runner.os }}-data-retro
      
      - name: Run retrospective test
        run: |
          python main.py retrospective --start-year 1950 --end-year 2024 --output-dir outputs
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: retrospective-results
          path: outputs/retrospective_*.json
